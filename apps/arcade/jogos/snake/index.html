<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNAKE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-bar">
        <span>Arquivo</span>
        <span>Editar</span>
        <span>Exibir</span>
        <span>Ajuda</span>
    </div>
    
    <div class="game-header">
        <button class="back-btn" id="backToArcade">← VOLTAR</button>
        <div class="game-title">SNAKE</div>
        <div class="credit-indicator">[1 CRÉDITO]</div>
    </div>
    
    <div class="score-panel">
        <div class="score-box">
            <span class="score-label">PONTOS</span>
            <span class="score-value" id="score">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">RECORDE</span>
            <span class="score-value" id="highScore">0</span>
        </div>
    </div>
    
    <div class="mode-panel">
        <span class="mode-label">MODO:</span>
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="classic">CLÁSSICO</button>
            <button class="mode-btn" data-mode="walls">PAREDES MATA</button>
        </div>
    </div>
    
    <div class="game-area">
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="start-screen" id="startScreen">
            <div class="message-box">
                <span>SNAKE</span>
                <span class="small">Use as setas para mover</span>
                <button class="game-btn" id="startGameBtn">INICIAR</button>
                <div class="control-keys">
                    <span class="key">▲</span>
                    <span class="key">▼</span>
                    <span class="key">◀</span>
                    <span class="key">▶</span>
                </div>
            </div>
        </div>
        
        <div class="pause-screen hidden" id="pauseScreen">
            <div class="message-box">
                <span>PAUSADO</span>
                <span>ESPAÇO</span>
            </div>
        </div>
    </div>
    
    <div class="controls-panel">
        <div class="control-group">
            <span class="key">▲</span>
            <span class="key">▼</span>
            <span class="key">◀</span>
            <span class="key">▶</span>
            <span>MOVER</span>
        </div>
        <div class="control-group">
            <span class="key">ESPAÇO</span>
            <span>PAUSAR</span>
        </div>
        <div class="control-group">
            <span class="key">R</span>
            <span>REINICIAR</span>
        </div>
        <button class="game-btn" id="newGameBtn">NOVO JOGO</button>
    </div>
    
    <div class="touch-controls">
        <div class="d-pad">
            <button class="touch-btn" id="touchUp">▲</button>
            <div class="d-pad-row">
                <button class="touch-btn" id="touchLeft">◀</button>
                <button class="touch-btn" id="touchDown">▼</button>
                <button class="touch-btn" id="touchRight">▶</button>
            </div>
        </div>
    </div>
    
    <div class="status-bar">
        <span>© SNAKE ARCADE</span>
        <span>1976</span>
    </div>
    
    <div class="message-screen hidden" id="gameOverScreen">
        <div class="message-content">
            <h2>GAME OVER</h2>
            <p id="gameOverScore">Pontuação: 0</p>
            <p id="gameOverHighScore">Recorde: 0</p>
            <button class="game-btn" id="restartBtn">JOGAR NOVAMENTE</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

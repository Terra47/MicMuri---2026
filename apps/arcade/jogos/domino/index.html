<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DOMINÓ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="menu-bar">
        <span>Arquivo</span>
        <span>Editar</span>
        <span>Exibir</span>
        <span>Ajuda</span>
    </div>
    
    <div class="game-header">
        <button class="back-btn" id="backToArcade">← VOLTAR</button>
        <div class="game-title">DOMINÓ</div>
        <div class="credit-indicator">[1 CRÉDITO]</div>
    </div>
    
    <div class="score-panel">
        <div class="score-box">
            <span class="score-label">SUA PONTUAÇÃO</span>
            <span class="score-value" id="playerScore">0</span>
        </div>
        <div class="score-box">
            <span class="score-label">PEÇAS</span>
            <span class="score-value" id="remainingPieces">28</span>
        </div>
    </div>
    
    <div class="message-area" id="messageArea">
        <span id="messageText">Clique em uma peça para começar</span>
    </div>
    
    <div class="game-area">
        <div class="computer-area">
            <div class="hand-label">COMPUTADOR</div>
            <div class="computer-hand" id="computerHand"></div>
        </div>
        
        <div class="game-board" id="gameBoard">
            <div class="board-center" id="boardCenter"></div>
        </div>
        
        <div class="player-area">
            <div class="hand-label">SUA MÃO</div>
            <div class="player-hand" id="playerHand"></div>
        </div>
    </div>
    
    <div class="controls-panel">
        <div class="turn-indicator">
            <span class="turn-text" id="turnText">SUA VEZ</span>
            <span class="turn-light" id="turnLight"></span>
        </div>
        <button class="game-btn" id="drawBtn">COMPRAR</button>
        <button class="game-btn" id="passBtn">PASSAR</button>
        <button class="game-btn" id="newGameBtn">NOVO JOGO</button>
    </div>
    
    <div class="status-bar">
        <span>© DOMINÓ ARCADE</span>
        <span>Clique no tabuleiro para jogar</span>
    </div>
    
    <div class="message-screen hidden" id="gameOverScreen">
        <div class="message-content">
            <h2 id="gameOverTitle">FIM DE JOGO</h2>
            <p id="gameOverMessage"></p>
            <p id="gameOverScore"></p>
            <button class="game-btn" id="restartBtn">JOGAR NOVAMENTE</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
